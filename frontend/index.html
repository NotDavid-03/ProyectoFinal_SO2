<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Logs - Robótica UMG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 border-b border-gray-800 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-indigo-400 tracking-wide">🤖 ROBOT LOGS</h1>
                <p class="text-gray-400 text-sm mt-1">Monitoreo de eventos en tiempo real - Proyecto Final SO2</p>
            </div>
            <div class="text-right">
                <span id="status-tag" class="px-3 py-1 rounded-full text-xs font-semibold bg-green-900 text-green-300 border border-green-700">
                    Sistema Activo
                </span>
            </div>
        </header>

        <main class="bg-gray-800 rounded-lg shadow-xl overflow-hidden border border-gray-700">
            <div class="p-4 bg-gray-700 flex justify-between items-center border-b border-gray-600">
                <h2 class="text-lg font-semibold text-white">Historial de Eventos</h2>
                <button onclick="cargarLogs()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded text-sm font-medium transition duration-200">
                    🔄 Actualizar
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900 text-indigo-300 text-xs uppercase font-bold tracking-wider border-b border-gray-700">
                            <th class="p-4">Timestamp</th>
                            <th class="p-4">Componente</th>
                            <th class="p-4">Acción / Evento</th>
                            <th class="p-4">Datos Extra (JSON)</th>
                        </tr>
                    </thead>
                    <tbody id="logs-container" class="divide-y divide-gray-700 text-sm">
                        <tr id="loading-row">
                            <td colspan="4" class="p-8 text-center text-gray-400 italic">
                                Cargando eventos del servidor...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Configuración de la URL del backend (Local para pruebas, luego la cambiaremos por la IP de Google Cloud)
        const API_URL = "http://127.0.0.1:8000/api/eventos";

        async function cargarLogs() {
            const container = document.getElementById("logs-container");
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Error en la respuesta del servidor");
                
                const eventos = await response.json();
                
                if (eventos.length === 0) {
                    container.innerHTML = `
                        <tr>
                            <td colspan="4" class="p-8 text-center text-gray-400 italic">
                                No hay eventos registrados en la base de datos aún.
                            </td>
                        </tr>`;
                    return;
                }

                // Limpiar contenedor e inyectar filas
                container.innerHTML = "";
                eventos.forEach(evento => {
                    // Formatear la fecha para que sea legible
                    const fecha = new Date(evento.timestamp).toLocaleString();
                    
                    const fila = document.createElement("tr");
                    fila.className = "hover:bg-gray-750 transition duration-150";
                    fila.innerHTML = `
                        <td class="p-4 font-mono text-gray-400 whitespace-nowrap">${fecha}</td>
                        <td class="p-4 font-semibold text-indigo-400">${evento.componente}</td>
                        <td class="p-4 text-gray-200">${evento.accion}</td>
                        <td class="p-4 font-mono text-xs text-green-400 max-w-xs truncate">${JSON.stringify(evento.datos)}</td>
                    `;
                    container.appendChild(fila);
                });

            } catch (error) {
                console.error("Error al conectar con el backend:", error);
                container.innerHTML = `
                    <tr>
                        <td colspan="4" class="p-8 text-center text-red-400 font-medium">
                            ⚠️ No se pudo conectar con el servidor Backend. Asegúrate de que esté corriendo.
                        </td>
                    </tr>`;
            }
        }

        // Cargar los logs automáticamente al abrir la página
        window.onload = cargarLogs;
        
        // Auto-actualizar cada 5 segundos para simular tiempo real
        setInterval(cargarLogs, 5000);
    </script>
</body>
</html>
